name: CD

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::746669221991:role/navigator-chatapi-github-role
          aws-region: us-east-1

      - name: Deploy to ECS (staging)
        run: |
          CLUSTER=$(aws ssm get-parameter --name /navigator/staging/agent/cluster-name --query Parameter.Value --output text)
          SERVICE=$(aws ssm get-parameter --name /navigator/staging/agent/service-name --query Parameter.Value --output text)
          aws ecs update-service --cluster $CLUSTER --service $SERVICE --force-new-deployment --region us-east-1
